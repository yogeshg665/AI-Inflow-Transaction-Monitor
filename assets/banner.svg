<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Influx - AI Inflow Transaction Monitor - deterministic monitoring of inbound transactions and suspicious inflows">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1322"/>
      <stop offset="0.55" stop-color="#0e1b2e"/>
      <stop offset="1" stop-color="#0c2a2f"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8ff0e3"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1b3340" stroke-width="1" opacity="0.55">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="230" x2="1280" y2="230"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="800" y1="0" x2="800" y2="360"/>
    <line x1="960" y1="0" x2="960" y2="360"/>
    <line x1="1120" y1="0" x2="1120" y2="360"/>
  </g>

  <!-- inflow streams converging to a monitored node -->
  <g fill="none" stroke="url(#flow)" stroke-width="4" stroke-linecap="round">
    <path d="M820,90 C960,110 1010,150 1120,180"/>
    <path d="M800,180 C960,180 1010,180 1120,180"/>
    <path d="M820,270 C960,250 1010,210 1120,180"/>
  </g>
  <!-- inflow chevrons -->
  <g fill="#2dd4bf" opacity="0.85">
    <polygon points="980,92 996,100 980,108"/>
    <polygon points="980,172 996,180 980,188"/>
    <polygon points="980,252 996,260 980,268"/>
  </g>
  <!-- monitored focal node -->
  <circle cx="1120" cy="180" r="34" fill="url(#glow)"/>
  <circle cx="1120" cy="180" r="9" fill="#0c2a2f" stroke="#2dd4bf" stroke-width="3"/>

  <!-- eyebrow -->
  <text x="82" y="92" font-family="Consolas, 'SFMono-Regular', Menlo, monospace" font-size="15"
        letter-spacing="4" fill="#56b9ad">AI INFLOW TRANSACTION MONITOR &#8226; DETERMINISTIC &#8226; HUMAN-REVIEW GATED</text>

  <!-- title -->
  <text x="80" y="158" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62"
        font-weight="700" fill="url(#title)">Influx</text>

  <!-- tagline -->
  <text x="82" y="202" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="23"
        fill="#9fc4c0">Deterministic monitoring of inbound transactions and suspicious inflows</text>

  <!-- feature pills -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16">
    <rect x="82" y="238" rx="16" ry="16" width="150" height="36" fill="#102a30" stroke="#1f4a4f"/>
    <text x="157" y="262" text-anchor="middle" fill="#b9ece4">Deterministic</text>

    <rect x="246" y="238" rx="16" ry="16" width="194" height="36" fill="#102a30" stroke="#1f4a4f"/>
    <text x="343" y="262" text-anchor="middle" fill="#cfeae6">Pseudonymous IDs</text>

    <rect x="454" y="238" rx="16" ry="16" width="206" height="36" fill="#102a30" stroke="#1f4a4f"/>
    <text x="557" y="262" text-anchor="middle" fill="#cfeae6">Human-review gates</text>
  </g>
</svg>
